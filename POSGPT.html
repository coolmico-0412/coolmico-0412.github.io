<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
padding:10px
}

table{
width:100%;
border-collapse:collapse
}

td,th{
border:1px solid #ccc;
padding:8px
}

button{
padding:10px;
font-size:16px
}

</style>

</head>

<body>

<h2>ขาย / 收銀</h2>

<button onclick="scan()">📷 Scan</button>

<table>

<thead>
<tr>
<th>สินค้า</th>
<th>ราคา</th>
<th>จำนวน</th>
<th>รวม</th>
</tr>
</thead>

<tbody id="cart"></tbody>

</table>

<h3>
รวม Total:
<span id="total">0</span>
บาท
</h3>

<button onclick="checkout()">
ชำระเงิน / 結帳
</button>

<script>

let cart=[]
let products=JSON.parse(localStorage.getItem("products")||"{}")

function addProduct(barcode){

let p=products[barcode]

if(!p){
alert("ไม่พบสินค้า / 未找到商品")
return
}

let item=cart.find(i=>i.barcode==barcode)

if(item){

item.qty++

}else{

cart.push({
barcode:barcode,
name:p.name_th,
price:p.price,
qty:1
})

}

render()

}

function render(){

let html=""
let total=0

cart.forEach((i,index)=>{

let sum=i.price*i.qty

total+=sum

html+=`
<tr>
<td>${i.name}</td>
<td>${i.price}</td>
<td>
<button onclick="minus(${index})">-</button>
${i.qty}
<button onclick="plus(${index})">+</button>
</td>
<td>${sum}</td>
</tr>
`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText=total

}

function plus(i){
cart[i].qty++
render()
}

function minus(i){

cart[i].qty--

if(cart[i].qty<=0){
cart.splice(i,1)
}

render()
}

function checkout(){

let total=0

cart.forEach(i=>{
total+=i.price*i.qty
})

let sales=JSON.parse(localStorage.getItem("sales")||"[]")

sales.push({
date:new Date().toISOString(),
items:cart,
total:total
})

localStorage.setItem("sales",JSON.stringify(sales))

cart=[]

render()

alert("ขายสำเร็จ / 交易完成")

}

</script>

</body>
</html>
