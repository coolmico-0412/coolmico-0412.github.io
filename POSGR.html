<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>條碼POS系統 - Web版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .cart-item { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl overflow-hidden">
        <!-- 頂部導航 -->
        <div class="flex border-b">
            <button onclick="showPage('pos')" id="tab-pos"
                class="flex-1 py-4 text-lg font-medium tab-active">銷售</button>
            <button onclick="showPage('reports')" id="tab-reports"
                class="flex-1 py-4 text-lg font-medium">報表</button>
        </div>

        <!-- 銷售頁面 -->
        <div id="pos-page">
            <div class="p-6">
                <button onclick="startScanner()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-medium flex items-center justify-center gap-3">
                    📷 掃描條碼
                </button>

                <!-- 購物車 -->
                <div class="mt-8">
                    <h2 class="text-lg font-bold mb-3">購物車</h2>
                    <div id="cart-list" class="space-y-3 min-h-[300px]"></div>
                </div>
            </div>

            <!-- 總計與結帳 -->
            <div class="fixed bottom-0 left-0 right-0 max-w-md bg-white border-t p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-bold">總計</span>
                    <span id="total" class="text-3xl font-bold text-blue-600">NT$ 0</span>
                </div>
                <button onclick="checkout()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-2xl font-medium">
                    結帳
                </button>
            </div>
        </div>

        <!-- 報表頁面 -->
        <div id="reports-page" class="hidden p-6">
            <h2 class="text-xl font-bold mb-6">銷售報表</h2>
            
            <div class="mb-8">
                <h3 class="font-semibold mb-3 text-green-700">📅 每日銷售</h3>
                <div id="daily-list" class="space-y-2"></div>
            </div>
            
            <div>
                <h3 class="font-semibold mb-3 text-green-700">📆 每月銷售</h3>
                <div id="monthly-list" class="space-y-2"></div>
            </div>

            <button onclick="clearAllData()" 
                class="mt-10 w-full text-red-500 text-sm py-3 border border-red-300 rounded-xl">
                🗑️ 清空所有交易紀錄
            </button>
        </div>
    </div>

    <!-- 掃描器 Modal -->
    <div id="scanner-modal" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
        <div class="bg-white p-4 flex justify-between items-center">
            <span class="text-lg font-medium">掃描條碼</span>
            <button onclick="stopScanner()" class="text-3xl leading-none">✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <div id="reader" class="w-full h-full"></div>
        </div>
        <div class="bg-white p-4 text-center text-sm text-gray-500">
            請對準商品條碼
        </div>
    </div>

<script>
// ==================== 資料 ====================
let cart = [];
const products = {
    '6901234567890': { name: '可口可樂', price: 35 },
    '4710112345678': { name: '維他露P', price: 28 },
    '4711234567890': { name: '統一麵包', price: 25 },
    '4712345678901': { name: '樂事洋芋片', price: 45 },
    '4713456789012': { name: '舒跑', price: 32 },
    '6909876543210': { name: '雀巢咖啡', price: 55 }
};

let transactions = JSON.parse(localStorage.getItem('pos_transactions')) || [];

// ==================== Tailwind 初始化 ====================
function initTailwind() {
    // Tailwind 已透過 CDN 載入
}

// ==================== 頁面切換 ====================
function showPage(page) {
    document.getElementById('pos-page').classList.add('hidden');
    document.getElementById('reports-page').classList.add('hidden');
    document.getElementById(page + '-page').classList.remove('hidden');
    
    document.getElementById('tab-pos').classList.toggle('tab-active', page === 'pos');
    document.getElementById('tab-reports').classList.toggle('tab-active', page === 'reports');
    
    if (page === 'reports') renderReports();
}

// ==================== 購物車 ====================
function renderCart() {
    const list = document.getElementById('cart-list');
    list.innerHTML = '';
    
    if (cart.length === 0) {
        list.innerHTML = `<p class="text-center text-gray-400 py-12">尚未掃描商品</p>`;
        document.getElementById('total').textContent = 'NT$ 0';
        return;
    }
    
    let total = 0;
    cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        
        const div = document.createElement('div');
        div.className = 'cart-item bg-gray-50 p-4 rounded-2xl flex justify-between items-center';
        div.innerHTML = `
            <div>
                <div class="font-medium">${item.name}</div>
                <div class="text-sm text-gray-500">NT$ ${item.price} × ${item.qty}</div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="changeQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow">-</button>
                <span class="font-medium w-6 text-center">${item.qty}</span>
                <button onclick="changeQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow">+</button>
                <button onclick="removeItem(${index})" class="ml-3 text-red-500">刪除</button>
            </div>
        `;
        list.appendChild(div);
    });
    
    document.getElementById('total').innerHTML = `NT$ ${total}`;
}

function changeQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty < 1) cart.splice(index, 1);
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function addToCart(barcode) {
    if (products[barcode]) {
        const existing = cart.find(item => item.barcode === barcode);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({
                barcode: barcode,
                name: products[barcode].name,
                price: products[barcode].price,
                qty: 1
            });
        }
        renderCart();
    } else {
        alert('❌ 未知條碼！請先在程式碼中新增此商品');
    }
}

// ==================== 掃描器 ====================
let html5QrCodeScanner = null;

function startScanner() {
    document.getElementById('scanner-modal').classList.remove('hidden');
    
    if (html5QrCodeScanner) {
        html5QrCodeScanner.clear();
    }
    
    html5QrCodeScanner = new Html5QrcodeScanner(
        "reader",
        { 
            fps: 15, 
            qrbox: { width: 280, height: 280 },
            rememberLastUsedCamera: true
        },
        false
    );
    
    html5QrCodeScanner.render((decodedText) => {
        stopScanner();
        addToCart(decodedText.trim());
    }, (error) => {
        // 忽略持續掃描錯誤
    });
}

function stopScanner() {
    if (html5QrCodeScanner) {
        html5QrCodeScanner.clear();
        html5QrCodeScanner = null;
    }
    document.getElementById('scanner-modal').classList.add('hidden');
}

// ==================== 結帳 ====================
function checkout() {
    if (cart.length === 0) {
        alert('購物車是空的！');
        return;
    }
    
    const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    
    const transaction = {
        date: new Date().toISOString(),
        total: total,
        items: JSON.parse(JSON.stringify(cart))
    };
    
    transactions.unshift(transaction);
    localStorage.setItem('pos_transactions', JSON.stringify(transactions));
    
    alert(`✅ 結帳成功！\n總計 NT$ ${total}\n已儲存紀錄`);
    
    cart = [];
    renderCart();
    showPage('reports');
}

// ==================== 報表 ====================
function renderReports() {
    const dailyList = document.getElementById('daily-list');
    const monthlyList = document.getElementById('monthly-list');
    dailyList.innerHTML = '';
    monthlyList.innerHTML = '';
    
    const daily = {};
    const monthly = {};
    
    transactions.forEach(t => {
        const d = new Date(t.date);
        const dayKey = d.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const monthKey = d.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit' });
        
        daily[dayKey] = (daily[dayKey] || 0) + t.total;
        monthly[monthKey] = (monthly[monthKey] || 0) + t.total;
    });
    
    // 每日
    Object.keys(daily).sort().reverse().forEach(key => {
        const div = document.createElement('div');
        div.className = 'bg-green-50 p-4 rounded-2xl flex justify-between';
        div.innerHTML = `<span>${key}</span><span class="font-bold text-green-700">NT$ ${daily[key]}</span>`;
        dailyList.appendChild(div);
    });
    
    // 每月
    Object.keys(monthly).sort().reverse().forEach(key => {
        const div = document.createElement('div');
        div.className = 'bg-green-50 p-4 rounded-2xl flex justify-between';
        div.innerHTML = `<span>${key}</span><span class="font-bold text-green-700">NT$ ${monthly[key]}</span>`;
        monthlyList.appendChild(div);
    });
    
    if (transactions.length === 0) {
        dailyList.innerHTML = `<p class="text-center text-gray-400 py-8">尚無交易紀錄</p>`;
    }
}

function clearAllData() {
    if (confirm('確定要刪除所有交易紀錄嗎？此動作無法復原！')) {
        transactions = [];
        localStorage.removeItem('pos_transactions');
        renderReports();
        alert('已清空所有紀錄');
    }
}

// ==================== 啟動 ====================
window.onload = function() {
    initTailwind();
    renderCart();
    showPage('pos');
    
    // 預設點擊銷售頁
    document.getElementById('tab-pos').classList.add('bg-blue-100', 'text-blue-700');
};
</script>
</body>
</html>
